## Settings file was created by plugin Spacefleet Economy Overhaul v0.4.0
## Plugin GUID: local.spacefleet.economy-overhaul

[General]

## Enable economy price balancing.
# Setting type: Boolean
# Default value: true
Enabled = true

[GlobalMarket]

## How strongly global demand/supply affects local prices.
# Setting type: Single
# Default value: 0.25
GlobalDemandWeight = 0.25

## Minimum global demand multiplier.
# Setting type: Single
# Default value: 0.8
GlobalDemandMinMultiplier = 0.8

## Maximum global demand multiplier.
# Setting type: Single
# Default value: 1.25
GlobalDemandMaxMultiplier = 1.25

[Performance]

## Seconds to cache global demand multipliers.
# Setting type: Single
# Default value: 2
PriceCacheSeconds = 2

[Prices]

## Lowest allowed price as a fraction of resource base price.
# Setting type: Single
# Default value: 0.35
MinPriceRatio = 0.35

## Highest allowed price as a multiple of resource base price.
# Setting type: Single
# Default value: 4
MaxPriceRatio = 4

## Extra price pressure when a market is below ideal stock.
# Setting type: Single
# Default value: 0.35
ScarcityPremium = 0.35

## Discount pressure when a market is above ideal stock.
# Setting type: Single
# Default value: 0.2
AbundanceDiscount = 0.2

[Trade]

## Reject market trades smaller than this to avoid dust trades.
# Setting type: Single
# Default value: 0.5
MinimumTradeQuantity = 0.5

## Lowest profit margin auto-traders are allowed to relax to.
# Setting type: Single
# Default value: 0.05
MinimumAutoTraderProfitMargin = 0.05

[TradeFlow]

## Minimum resupplyRatePerHour enforced on all markets. Vanilla can be 0, which blocks ALL trade.
# Setting type: Single
# Default value: 2
MinResupplyRate = 2

## Multiplier for fuel trade rate (vanilla is 10x). Increase to let more fuel flow per hour.
# Setting type: Single
# Default value: 10
FuelResupplyMultiplier = 10

## How fast stockRatios recover per production cycle for outputs with surplus.
# Setting type: Single
# Default value: 0.5
StockRatioRecoveryRate = 0.5

## If inventory fill ratio exceeds this, stock ratio recovery kicks in.
# Setting type: Single
# Default value: 0.5
StockRatioRecoveryThreshold = 0.5

## Target stockRatio for surplus outputs (fraction of storageMax). v0.3.0 had 5.0 which was a bug.
# Setting type: Single
# Default value: 0.15
SurplusDumpRatio = 0.15

## Max fraction of fuel inventory a station can reserve. Rest is always available for sale.
# Setting type: Single
# Default value: 0.1
FuelReserveMaxRatio = 0.1

